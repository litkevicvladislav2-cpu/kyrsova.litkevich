<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Keyboard</title>

<style>
body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Контейнер */
.keyboard {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Ряд */
.row {
    display: flex;
    margin-bottom: 8px;
}

/* Кнопка */
.key {
    background: #0f172a;
    color: white;
    border: none;
    padding: 15px;
    margin: 3px;
    border-radius: 8px;
    min-width: 40px;
    text-align: center;
    font-family: sans-serif;
    transition: 0.2s;
}

/* Ефект */
.key:hover {
    background: #334155;
    cursor: pointer;
}

/* Спеціальні кнопки */
.wide { min-width: 80px; }
.extra-wide { min-width: 200px; }

/* Fn кнопка */
.fn {
    border: 2px solid red;
}
</style>

</head>
<body>

<div class="keyboard">

    <div class="row">
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
    </div>

    <div class="row">
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
    </div>

    <div class="row">
        <div class="key wide">Shift</div>
        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key">M</div>
        <div class="key wide">Shift</div>
    </div>

    <div class="row">
        <div class="key">Ctrl</div>
        <div class="key fn">Fn</div>
        <div class="key">Win</div>
        <div class="key">Alt</div>
        <div class="key extra-wide">Space</div>
        <div class="key">Alt</div>
        <div class="key">Ctrl</div>
    </div>

</div>

</body>
</html>
