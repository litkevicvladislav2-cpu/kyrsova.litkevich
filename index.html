<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Full Keyboard</title>

<style>
body {
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Контейнер */
.keyboard {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Ряд */
.row {
    display: flex;
    margin-bottom: 6px;
}

/* Кнопки */
.key {
    background: #0f172a;
    color: white;
    padding: 12px;
    margin: 3px;
    border-radius: 8px;
    min-width: 40px;
    text-align: center;
    font-family: sans-serif;
    font-size: 12px;
    transition: 0.2s;
}

.key:hover {
    background: #334155;
}

/* Розміри */
.wide { min-width: 80px; }
.extra-wide { min-width: 200px; }
.big { min-width: 100px; }

/* Fn */
.fn {
    border: 2px solid red;
}
</style>

</head>
<body>

<div class="keyboard">

<!-- F-клавіші -->
<div class="row">
<div class="key">Esc</div>
<div class="key">F1</div>
<div class="key">F2</div>
<div class="key">F3</div>
<div class="key">F4</div>
<div class="key">F5</div>
<div class="key">F6</div>
<div class="key">F7</div>
<div class="key">F8</div>
<div class="key">F9</div>
<div class="key">F10</div>
<div class="key">F11</div>
<div class="key">F12</div>
<div class="key">PrtSc</div>
<div class="key">Ins</div>
<div class="key">Del</div>
</div>

<!-- Цифри -->
<div class="row">
<div class="key">~</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">0</div>
<div class="key">-</div>
<div class="key">=</div>
<div class="key wide">Backspace</div>
</div>

<!-- QWERTY -->
<div class="row">
<div class="key wide">Tab</div>
<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>
<div class="key">[</div>
<div class="key">]</div>
<div class="key">\</div>
</div>

<!-- ASDF -->
<div class="row">
<div class="key wide">Caps</div>
<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key">;</div>
<div class="key">'</div>
<div class="key wide">Enter</div>
</div>

<!-- ZXCV -->
<div class="row">
<div class="key big">Shift</div>
<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key">,</div>
<div class="key">.</div>
<div class="key">/</div>
<div class="key big">Shift</div>
</div>

<!-- Нижній ряд -->
<div class="row">
<div class="key">Ctrl</div>
<div class="key fn">Fn</div>
<div class="key">Win</div>
<div class="key">Alt</div>
<div class="key extra-wide">Space</div>
<div class="key">Alt</div>
<div class="key">Ctrl</div>
<div class="key">←</div>
<div class="key">↑</div>
<div class="key">↓</div>
<div class="key">→</div>
</div>

</div>

</body>
</html>
